name: Build downloadable apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      NO_COLOR: "1"
      FLET_CLI_NO_RICH_OUTPUT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.29.3"
          channel: "stable"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          python -m pip install flet==0.28.3 flet-cli==0.28.3

      - name: Build APK
        run: flet build apk --verbose --no-rich-output --arch arm64-v8a --cleanup-app --cleanup-packages --exclude __pycache__ *.pyc

      - name: Normalize Android artifact name
        run: |
          APK_PATH="$(find build -name '*.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK file found"
            find build -maxdepth 5 -type f
            exit 1
          fi
          cp "$APK_PATH" tlm-app.apk
          ls -lh tlm-app.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: TLM-APP-Android-APK
          path: tlm-app.apk
          if-no-files-found: error

  windows:
    name: Windows app
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      NO_COLOR: "1"
      FLET_CLI_NO_RICH_OUTPUT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: "stable"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          python -m pip install flet==0.85.3

      - name: Build Windows app
        shell: pwsh
        run: |
          chcp 65001
          flet build windows --verbose

      - name: Pack Windows artifact
        shell: pwsh
        run: Compress-Archive -Path build/windows/* -DestinationPath TLM-APP-Windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TLM-APP-Windows
          path: TLM-APP-Windows.zip
          if-no-files-found: error

  linux:
    name: Linux app
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: "utf-8"
      NO_COLOR: "1"
      FLET_CLI_NO_RICH_OUTPUT: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            binutils clang cmake llvm lld ninja-build pkg-config \
            libgtk-3-dev libsecret-1-0 libsecret-1-dev libunwind-dev \
            gstreamer1.0-alsa gstreamer1.0-gl gstreamer1.0-gtk3 gstreamer1.0-libav \
            gstreamer1.0-plugins-bad gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-ugly gstreamer1.0-pulseaudio gstreamer1.0-qt5 \
            gstreamer1.0-tools gstreamer1.0-x \
            libasound2-dev libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev libgstreamer-plugins-bad1.0-dev \
            libmpv-dev mpv

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.7"
          channel: "stable"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          python -m pip install flet==0.85.3

      - name: Build Linux app
        run: flet build linux --verbose

      - name: Pack Linux artifact
        run: zip -r TLM-APP-Linux.zip build/linux

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: TLM-APP-Linux
          path: TLM-APP-Linux.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - android
      - windows
      - linux
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.apk
            release-assets/**/*.zip
          body_path: CHANGELOG.md
