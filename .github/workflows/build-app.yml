name: Build downloadable apps

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          python -m pip install flet

      - name: Build APK
        run: flet build apk --verbose

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: TLM-APP-Android-APK
          path: build/apk/*.apk
          if-no-files-found: error

  windows:
    name: Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Flet
        run: |
          python -m pip install --upgrade pip
          python -m pip install flet

      - name: Build Windows app
        run: flet build windows --verbose

      - name: Pack Windows artifact
        shell: pwsh
        run: Compress-Archive -Path build/windows/* -DestinationPath TLM-APP-Windows.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: TLM-APP-Windows
          path: TLM-APP-Windows.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - android
      - windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/**/*.apk
            release-assets/**/*.zip
          body_path: CHANGELOG.md
